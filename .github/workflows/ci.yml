name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: PHP 8.3 — PHPUnit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: laravel-rebuild

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, sqlite3, pdo_sqlite, dom, curl, intl
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: laravel-rebuild/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('laravel-rebuild/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run test suite
        run: php artisan test --stop-on-failure
        env:
          APP_ENV: testing
          APP_KEY: base64:placeholder-will-be-replaced-by-artisan
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
          SESSION_DRIVER: array
          BCRYPT_ROUNDS: 4
